<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/leaf.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An interactive biodiversity atlas — explore the living world through iNaturalist data. A digital natural history museum."
    />
    <title>生命学院2026三江源实践</title>

    <!--
      Fonts: bilingual editorial system.
      English display serifs (Playfair Display, Cormorant Garamond) +
      Chinese display serif (Noto Serif SC) for headings;
      Inter (Latin) + PingFang SC / Noto Sans SC (CJK) for body.
      Browsers pick the font per glyph, so Latin text renders in the Latin
      font and Chinese text in the CJK font automatically.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet base styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- CesiumJS (3D expedition globe for the Journey Map) — loaded from the
         official CDN so Vite doesn't need to bundle workers/assets. -->
    <script>
      window.CESIUM_BASE_URL =
        'https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/';
    </script>
    <link
      rel="stylesheet"
      href="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Widgets/widgets.css"
    />
    <script
      src="https://cesium.com/downloads/cesiumjs/releases/1.122/Build/Cesium/Cesium.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
